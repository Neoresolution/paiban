<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>先锋组排班表 2026</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
    background: #f5f5f5;
    color: #333;
    line-height: 1.6;
    padding-bottom: 40px;
}
.header {
    background: linear-gradient(135deg, #1a3a5c 0%, #2d6a9f 100%);
    color: white;
    padding: 24px 16px;
    text-align: center;
}
.header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
}
.header .sub {
    font-size: 13px;
    opacity: 0.8;
    margin-top: 4px;
}

/* 本周卡片 */
.this-week-card {
    margin: 16px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    overflow: hidden;
}
.this-week-card .card-header {
    background: #c41230;
    color: white;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 600;
    text-align: center;
}
.this-week-card .card-body {
    padding: 20px 16px;
    display: flex;
    justify-content: space-around;
    text-align: center;
}
.this-week-card .role {
    flex: 1;
}
.this-week-card .role-label {
    font-size: 12px;
    color: #888;
    margin-bottom: 8px;
}
.this-week-card .role-name {
    font-size: 28px;
    font-weight: 700;
    color: #1a3a5c;
}
.this-week-card .role-date {
    font-size: 12px;
    color: #999;
    margin-top: 4px;
}
.card-divider {
    width: 1px;
    background: #eee;
}

/* 全年表格 */
.table-container {
    margin: 16px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    overflow: hidden;
}
.table-container h2 {
    font-size: 16px;
    padding: 14px 16px 8px;
    color: #1a3a5c;
    text-align: center;
}
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
}
thead th {
    background: #f0f4f8;
    color: #555;
    font-weight: 600;
    padding: 10px 8px;
    position: sticky;
    top: 0;
    font-size: 13px;
}
tbody td {
    padding: 10px 8px;
    text-align: center;
    border-bottom: 1px solid #f0f0f0;
}
tbody tr.this-week {
    background: #fff8e1;
    font-weight: 700;
}
tbody tr.this-week td:first-child::before {
    content: "▶ ";
    color: #c41230;
    font-size: 10px;
}
tbody tr:hover {
    background: #f5f8fc;
}
tbody tr.this-week:hover {
    background: #fff3cd;
}
.month-sep {
    background: #e8edf2 !important;
    font-weight: 600;
    color: #1a3a5c;
    font-size: 13px;
}
.month-sep td {
    padding: 6px 8px;
}

/* 底部说明 */
.footer {
    margin: 16px;
    padding: 12px 16px;
    background: white;
    border-radius: 12px;
    font-size: 12px;
    color: #999;
    text-align: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}

/* 跳转按钮 */
.jump-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #1a3a5c;
    color: white;
    border: none;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
}
.jump-btn:active {
    background: #c41230;
}
</style>
</head>
<body>

<div class="header">
    <h1>德恒金融证券业务先锋组</h1>
    <div class="sub">2026年例会排班表 · 每周四</div>
</div>

<div class="this-week-card" id="thisWeekCard">
    <div class="card-header" id="cardHeader">下次例会</div>
    <div class="card-body">
        <div class="role">
            <div class="role-label">主持</div>
            <div class="role-name" id="thisWeekHost">--</div>
        </div>
        <div class="card-divider"></div>
        <div class="role">
            <div class="role-label">资讯发布</div>
            <div class="role-name" id="thisWeekRadar">--</div>
        </div>
    </div>
    <div class="role-date" style="text-align:center;padding-bottom:14px;" id="thisWeekDate"></div>
</div>

<div class="table-container">
    <h2>全年排班表</h2>
    <table>
        <thead>
            <tr>
                <th>日期</th>
                <th>主持</th>
                <th>资讯发布</th>
            </tr>
        </thead>
        <tbody id="scheduleBody"></tbody>
    </table>
</div>

<div class="footer">
    主持顺序：黄磊→陈琦→安健→唐永生→秦韬→张忠钢（每人两周）<br>
    资讯顺序：黄磊→秦韬→张忠钢→唐永生→安健→陈琦（每人一周，延迟一期发布）<br>
    下次更新：2026年底 · 自动排班系统
</div>

<button class="jump-btn" onclick="scrollToToday()" title="回到本周">&#x1F4C5;</button>

<script>
const DATA = [{"date": "2026-01-01", "month": 1, "day": 1, "host": "安健", "radar": "安健"}, {"date": "2026-01-08", "month": 1, "day": 8, "host": "唐永生", "radar": "陈琦"}, {"date": "2026-01-15", "month": 1, "day": 15, "host": "唐永生", "radar": "黄磊"}, {"date": "2026-01-22", "month": 1, "day": 22, "host": "秦韬", "radar": "秦韬"}, {"date": "2026-01-29", "month": 1, "day": 29, "host": "秦韬", "radar": "张忠钢"}, {"date": "2026-02-05", "month": 2, "day": 5, "host": "张忠钢", "radar": "唐永生"}, {"date": "2026-02-12", "month": 2, "day": 12, "host": "张忠钢", "radar": "安健"}, {"date": "2026-02-19", "month": 2, "day": 19, "host": "黄磊", "radar": "陈琦"}, {"date": "2026-02-26", "month": 2, "day": 26, "host": "黄磊", "radar": "黄磊"}, {"date": "2026-03-05", "month": 3, "day": 5, "host": "陈琦", "radar": "秦韬"}, {"date": "2026-03-12", "month": 3, "day": 12, "host": "陈琦", "radar": "张忠钢"}, {"date": "2026-03-19", "month": 3, "day": 19, "host": "安健", "radar": "唐永生"}, {"date": "2026-03-26", "month": 3, "day": 26, "host": "安健", "radar": "安健"}, {"date": "2026-04-02", "month": 4, "day": 2, "host": "唐永生", "radar": "陈琦"}, {"date": "2026-04-09", "month": 4, "day": 9, "host": "唐永生", "radar": "黄磊"}, {"date": "2026-04-16", "month": 4, "day": 16, "host": "秦韬", "radar": "秦韬"}, {"date": "2026-04-23", "month": 4, "day": 23, "host": "秦韬", "radar": "张忠钢"}, {"date": "2026-04-30", "month": 4, "day": 30, "host": "张忠钢", "radar": "唐永生"}, {"date": "2026-05-07", "month": 5, "day": 7, "host": "张忠钢", "radar": "安健"}, {"date": "2026-05-14", "month": 5, "day": 14, "host": "黄磊", "radar": "陈琦"}, {"date": "2026-05-21", "month": 5, "day": 21, "host": "黄磊", "radar": "黄磊"}, {"date": "2026-05-28", "month": 5, "day": 28, "host": "陈琦", "radar": "秦韬"}, {"date": "2026-06-04", "month": 6, "day": 4, "host": "陈琦", "radar": "张忠钢"}, {"date": "2026-06-11", "month": 6, "day": 11, "host": "安健", "radar": "唐永生"}, {"date": "2026-06-18", "month": 6, "day": 18, "host": "安健", "radar": "安健"}, {"date": "2026-06-25", "month": 6, "day": 25, "host": "唐永生", "radar": "陈琦"}, {"date": "2026-07-02", "month": 7, "day": 2, "host": "唐永生", "radar": "黄磊"}, {"date": "2026-07-09", "month": 7, "day": 9, "host": "秦韬", "radar": "秦韬"}, {"date": "2026-07-16", "month": 7, "day": 16, "host": "秦韬", "radar": "张忠钢"}, {"date": "2026-07-23", "month": 7, "day": 23, "host": "张忠钢", "radar": "唐永生"}, {"date": "2026-07-30", "month": 7, "day": 30, "host": "张忠钢", "radar": "安健"}, {"date": "2026-08-06", "month": 8, "day": 6, "host": "黄磊", "radar": "陈琦"}, {"date": "2026-08-13", "month": 8, "day": 13, "host": "黄磊", "radar": "黄磊"}, {"date": "2026-08-20", "month": 8, "day": 20, "host": "陈琦", "radar": "秦韬"}, {"date": "2026-08-27", "month": 8, "day": 27, "host": "陈琦", "radar": "张忠钢"}, {"date": "2026-09-03", "month": 9, "day": 3, "host": "安健", "radar": "唐永生"}, {"date": "2026-09-10", "month": 9, "day": 10, "host": "安健", "radar": "安健"}, {"date": "2026-09-17", "month": 9, "day": 17, "host": "唐永生", "radar": "陈琦"}, {"date": "2026-09-24", "month": 9, "day": 24, "host": "唐永生", "radar": "黄磊"}, {"date": "2026-10-01", "month": 10, "day": 1, "host": "秦韬", "radar": "秦韬"}, {"date": "2026-10-08", "month": 10, "day": 8, "host": "秦韬", "radar": "张忠钢"}, {"date": "2026-10-15", "month": 10, "day": 15, "host": "张忠钢", "radar": "唐永生"}, {"date": "2026-10-22", "month": 10, "day": 22, "host": "张忠钢", "radar": "安健"}, {"date": "2026-10-29", "month": 10, "day": 29, "host": "黄磊", "radar": "陈琦"}, {"date": "2026-11-05", "month": 11, "day": 5, "host": "黄磊", "radar": "黄磊"}, {"date": "2026-11-12", "month": 11, "day": 12, "host": "陈琦", "radar": "秦韬"}, {"date": "2026-11-19", "month": 11, "day": 19, "host": "陈琦", "radar": "张忠钢"}, {"date": "2026-11-26", "month": 11, "day": 26, "host": "安健", "radar": "唐永生"}, {"date": "2026-12-03", "month": 12, "day": 3, "host": "安健", "radar": "安健"}, {"date": "2026-12-10", "month": 12, "day": 10, "host": "唐永生", "radar": "陈琦"}, {"date": "2026-12-17", "month": 12, "day": 17, "host": "唐永生", "radar": "黄磊"}, {"date": "2026-12-24", "month": 12, "day": 24, "host": "秦韬", "radar": "秦韬"}, {"date": "2026-12-31", "month": 12, "day": 31, "host": "秦韬", "radar": "张忠钢"}];
const TODAY = "2026-05-16";

function getNextThursday() {
    // Return the next upcoming Thursday (today if it's Thursday, otherwise next)
    const now = new Date();
    const day = now.getDay(); // 0=Sun, 1=Mon, ..., 6=Sat
    const daysUntil = (4 - day + 7) % 7; // days to next Thu (0 if today is Thu)
    const thu = new Date(now);
    thu.setDate(thu.getDate() + daysUntil);
    return thu.toISOString().slice(0, 10);
}

function render() {
    const tbody = document.getElementById('scheduleBody');
    let currentMonth = 0;
    let html = '';
    const nextThuDate = getNextThursday();

    DATA.forEach((d, i) => {
        const isThisWeek = d.date === nextThuDate;

        // Month separator
        if (d.month !== currentMonth) {
            currentMonth = d.month;
            html += `<tr class="month-sep"><td colspan="3">${d.month}月</td></tr>`;
        }

        html += `<tr class="${isThisWeek ? 'this-week' : ''}" id="row-${d.date}">
            <td>${d.month}/${String(d.day).padStart(2,'0')}</td>
            <td>${d.host}</td>
            <td>${d.radar}</td>
        </tr>`;
    });

    tbody.innerHTML = html;

    // Update top card with next upcoming duty
    let nextDuty = DATA.find(d => d.date === nextThuDate);
    if (!nextDuty) {
        nextDuty = DATA[0];
    }
    // Dynamic header: "本周例会" if within current week, else "下次例会"
    const now = new Date();
    const startOfWeek = new Date(now);
    startOfWeek.setDate(now.getDate() - (now.getDay() || 7) + 1); // Monday
    const endOfWeek = new Date(startOfWeek);
    endOfWeek.setDate(startOfWeek.getDate() + 6); // Sunday
    const nextDate = new Date(nextDuty.date + 'T00:00:00');
    const inThisWeek = nextDate >= startOfWeek && nextDate <= endOfWeek;
    document.getElementById('cardHeader').textContent = inThisWeek ? '本周例会' : '下次例会';

    document.getElementById('thisWeekHost').textContent = nextDuty.host;
    document.getElementById('thisWeekRadar').textContent = nextDuty.radar;
    document.getElementById('thisWeekDate').textContent =
        `${nextDuty.month}月${nextDuty.day}日（周四）`;

    // Scroll to highlighted row
    setTimeout(() => {
        const row = document.getElementById('row-' + nextDuty.date);
        if (row) row.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 400);
}

function scrollToToday() {
    const nextThuDate = getNextThursday();
    const row = document.getElementById('row-' + nextThuDate);
    if (row) row.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

render();
</script>
</body>
</html>
