<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>先锋组排班表 2026</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
    background: #f0f2f5;
    color: #333;
    line-height: 1.6;
    max-width: 600px;
    margin: 0 auto;
    padding-bottom: 60px;
}
.header {
    background: linear-gradient(135deg, #1a3a5c 0%, #2d6a9f 100%);
    color: white;
    padding: 28px 20px;
    text-align: center;
}
.header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 3px;
}
.header .sub {
    font-size: 13px;
    opacity: 0.75;
    margin-top: 6px;
}
.this-week-card {
    margin: 14px 12px;
    background: white;
    border-radius: 14px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
    overflow: hidden;
}
.this-week-card .card-header {
    background: #c41230;
    color: white;
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 600;
    text-align: center;
    letter-spacing: 1px;
}
.this-week-card .card-body {
    padding: 24px 16px 8px;
    display: flex;
    justify-content: space-around;
    text-align: center;
}
.this-week-card .role { flex: 1; }
.this-week-card .role-label {
    font-size: 12px;
    color: #999;
    margin-bottom: 6px;
    letter-spacing: 1px;
}
.this-week-card .role-name {
    font-size: 26px;
    font-weight: 700;
    color: #1a3a5c;
}
.this-week-card .role-date {
    font-size: 12px;
    color: #999;
    margin-top: 10px;
    text-align: center;
    padding-bottom: 16px;
}
.card-divider { width: 1px; background: #eee; }

.table-container {
    margin: 14px 12px;
    background: white;
    border-radius: 14px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
    overflow: hidden;
    padding-bottom: 4px;
}
.table-container h2 {
    font-size: 15px;
    padding: 16px 16px 10px;
    color: #1a3a5c;
    text-align: center;
    font-weight: 600;
}
table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead th {
    background: #f5f6f8;
    color: #666;
    font-weight: 600;
    padding: 10px 10px;
    font-size: 12px;
    position: sticky;
    top: 0;
    letter-spacing: 1px;
}
tbody td {
    padding: 10px 10px;
    text-align: center;
    border-bottom: 1px solid #f5f5f5;
}
.month-group .month-row:nth-child(even):not(.this-week) {
    background: #fafbfc;
}
tbody tr.this-week {
    background: #fff3cd;
    font-weight: 700;
    box-shadow: inset 4px 0 0 #c41230;
}
tbody tr.this-week td:first-child::before {
    content: "▶";
    color: #c41230;
    font-size: 9px;
    margin-right: 4px;
}
tbody tr:hover { background: #eef2f7; }
tbody tr.this-week:hover { background: #ffe69c; }
.month-sep {
    background: #e8ecf1 !important;
    font-weight: 700;
    color: #1a3a5c;
    font-size: 12px;
    text-align: left !important;
    letter-spacing: 2px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
}
.month-sep td { padding: 8px 12px; }
.month-sep .arrow {
    display: inline-block;
    font-size: 10px;
    margin-right: 4px;
    transition: transform 0.2s;
}
.month-group.past .month-sep .arrow { transform: rotate(-90deg); }
.month-group.past .month-row { display: none; }
.month-group .month-row { display: table-row; }

.footer {
    margin: 14px 12px;
    padding: 14px 16px;
    background: white;
    border-radius: 14px;
    font-size: 12px;
    color: #aaa;
    text-align: center;
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
    line-height: 1.8;
}

.jump-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #c41230;
    color: white;
    border: none;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 3px 12px rgba(196,18,48,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: transform 0.15s;
}
.jump-btn:active { transform: scale(0.92); }

@media (min-width: 640px) {
    body { padding-bottom: 80px; }
    .this-week-card, .table-container, .footer { margin-left: 0; margin-right: 0; }
}
</style>
</head>
<body>

<div class="header">
    <h1>德恒金融证券业务先锋组</h1>
    <div class="sub">2026年例会排班表 &middot; 每周五</div>
</div>

<div class="this-week-card">
    <div class="card-header" id="cardHeader">下次例会</div>
    <div class="card-body">
        <div class="role">
            <div class="role-label">主持</div>
            <div class="role-name" id="thisWeekHost">---</div>
        </div>
        <div class="card-divider"></div>
        <div class="role">
            <div class="role-label">资讯发布</div>
            <div class="role-name" id="thisWeekRadar">---</div>
        </div>
    </div>
    <div class="role-date" id="thisWeekDate"></div>
</div>

<div class="table-container">
    <h2>全年排班表</h2>
    <table id="scheduleTable">
        <thead>
            <tr><th>日期</th><th>主持</th><th>资讯发布</th></tr>
        </thead>
    </table>
</div>

<div class="footer">
    主持顺序：黄磊 &rarr; 陈琦 &rarr; 安健 &rarr; 唐永生 &rarr; 秦韬 &rarr; 张忠钢（每人两周）<br>
    资讯顺序：黄磊 &rarr; 秦韬 &rarr; 张忠钢 &rarr; 唐永生 &rarr; 安健 &rarr; 陈琦（每人一周，延迟一期发布）<br>
    页面生成于 <span id="genDate">---</span> &middot; 自动排班系统
</div>

<button class="jump-btn" onclick="scrollToToday()" title="跳到本周">&#128197;</button>

<script>
var DATA = [{"date": "2026-01-02", "month": 1, "day": 2, "host": "安健", "radar": "安健"}, {"date": "2026-01-09", "month": 1, "day": 9, "host": "唐永生", "radar": "陈琦"}, {"date": "2026-01-16", "month": 1, "day": 16, "host": "唐永生", "radar": "黄磊"}, {"date": "2026-01-23", "month": 1, "day": 23, "host": "秦韬", "radar": "秦韬"}, {"date": "2026-01-30", "month": 1, "day": 30, "host": "秦韬", "radar": "张忠钢"}, {"date": "2026-02-06", "month": 2, "day": 6, "host": "张忠钢", "radar": "唐永生"}, {"date": "2026-02-13", "month": 2, "day": 13, "host": "张忠钢", "radar": "安健"}, {"date": "2026-02-20", "month": 2, "day": 20, "host": "黄磊", "radar": "陈琦"}, {"date": "2026-02-27", "month": 2, "day": 27, "host": "黄磊", "radar": "黄磊"}, {"date": "2026-03-06", "month": 3, "day": 6, "host": "陈琦", "radar": "秦韬"}, {"date": "2026-03-13", "month": 3, "day": 13, "host": "陈琦", "radar": "张忠钢"}, {"date": "2026-03-20", "month": 3, "day": 20, "host": "安健", "radar": "唐永生"}, {"date": "2026-03-27", "month": 3, "day": 27, "host": "安健", "radar": "安健"}, {"date": "2026-04-03", "month": 4, "day": 3, "host": "唐永生", "radar": "陈琦"}, {"date": "2026-04-10", "month": 4, "day": 10, "host": "唐永生", "radar": "黄磊"}, {"date": "2026-04-17", "month": 4, "day": 17, "host": "秦韬", "radar": "秦韬"}, {"date": "2026-04-24", "month": 4, "day": 24, "host": "秦韬", "radar": "张忠钢"}, {"date": "2026-05-01", "month": 5, "day": 1, "host": "张忠钢", "radar": "唐永生"}, {"date": "2026-05-08", "month": 5, "day": 8, "host": "张忠钢", "radar": "安健"}, {"date": "2026-05-15", "month": 5, "day": 15, "host": "黄磊", "radar": "陈琦"}, {"date": "2026-05-22", "month": 5, "day": 22, "host": "黄磊", "radar": "黄磊"}, {"date": "2026-05-29", "month": 5, "day": 29, "host": "陈琦", "radar": "秦韬"}, {"date": "2026-06-05", "month": 6, "day": 5, "host": "陈琦", "radar": "张忠钢"}, {"date": "2026-06-12", "month": 6, "day": 12, "host": "安健", "radar": "唐永生"}, {"date": "2026-06-19", "month": 6, "day": 19, "host": "安健", "radar": "安健"}, {"date": "2026-06-26", "month": 6, "day": 26, "host": "唐永生", "radar": "陈琦"}, {"date": "2026-07-03", "month": 7, "day": 3, "host": "唐永生", "radar": "黄磊"}, {"date": "2026-07-10", "month": 7, "day": 10, "host": "秦韬", "radar": "秦韬"}, {"date": "2026-07-17", "month": 7, "day": 17, "host": "秦韬", "radar": "张忠钢"}, {"date": "2026-07-24", "month": 7, "day": 24, "host": "张忠钢", "radar": "唐永生"}, {"date": "2026-07-31", "month": 7, "day": 31, "host": "张忠钢", "radar": "安健"}, {"date": "2026-08-07", "month": 8, "day": 7, "host": "黄磊", "radar": "陈琦"}, {"date": "2026-08-14", "month": 8, "day": 14, "host": "黄磊", "radar": "黄磊"}, {"date": "2026-08-21", "month": 8, "day": 21, "host": "陈琦", "radar": "秦韬"}, {"date": "2026-08-28", "month": 8, "day": 28, "host": "陈琦", "radar": "张忠钢"}, {"date": "2026-09-04", "month": 9, "day": 4, "host": "安健", "radar": "唐永生"}, {"date": "2026-09-11", "month": 9, "day": 11, "host": "安健", "radar": "安健"}, {"date": "2026-09-18", "month": 9, "day": 18, "host": "唐永生", "radar": "陈琦"}, {"date": "2026-09-25", "month": 9, "day": 25, "host": "唐永生", "radar": "黄磊"}, {"date": "2026-10-02", "month": 10, "day": 2, "host": "秦韬", "radar": "秦韬"}, {"date": "2026-10-09", "month": 10, "day": 9, "host": "秦韬", "radar": "张忠钢"}, {"date": "2026-10-16", "month": 10, "day": 16, "host": "张忠钢", "radar": "唐永生"}, {"date": "2026-10-23", "month": 10, "day": 23, "host": "张忠钢", "radar": "安健"}, {"date": "2026-10-30", "month": 10, "day": 30, "host": "黄磊", "radar": "陈琦"}, {"date": "2026-11-06", "month": 11, "day": 6, "host": "黄磊", "radar": "黄磊"}, {"date": "2026-11-13", "month": 11, "day": 13, "host": "陈琦", "radar": "秦韬"}, {"date": "2026-11-20", "month": 11, "day": 20, "host": "陈琦", "radar": "张忠钢"}, {"date": "2026-11-27", "month": 11, "day": 27, "host": "安健", "radar": "唐永生"}, {"date": "2026-12-04", "month": 12, "day": 4, "host": "安健", "radar": "安健"}, {"date": "2026-12-11", "month": 12, "day": 11, "host": "唐永生", "radar": "陈琦"}, {"date": "2026-12-18", "month": 12, "day": 18, "host": "唐永生", "radar": "黄磊"}, {"date": "2026-12-25", "month": 12, "day": 25, "host": "秦韬", "radar": "张忠钢"}];

function pad2(n) { return n < 10 ? '0' + n : '' + n; }

function getNextFriday() {
    var now = new Date();
    var day = now.getDay();
    var daysUntil = (5 - day + 7) % 7;
    var fri = new Date(now);
    fri.setDate(fri.getDate() + daysUntil);
    var mm = fri.getMonth() + 1;
    var dd = fri.getDate();
    return {
        iso: fri.getFullYear() + '-' + pad2(mm) + '-' + pad2(dd),
        label: mm + '月' + dd + '日（周五）'
    };
}

function isInThisWeek(dateStr) {
    var now = new Date();
    var d = new Date(dateStr + 'T00:00:00');
    var startOfWeek = new Date(now);
    startOfWeek.setDate(now.getDate() - (now.getDay() || 7) + 1);
    startOfWeek.setHours(0,0,0,0);
    var endOfWeek = new Date(startOfWeek);
    endOfWeek.setDate(startOfWeek.getDate() + 6);
    endOfWeek.setHours(23,59,59,999);
    return d >= startOfWeek && d <= endOfWeek;
}

function toggleMonth(month) {
    var group = document.getElementById('month-' + month);
    if (group) group.classList.toggle('past');
}

function render() {
    var today = new Date();
    var thisMonth = today.getMonth() + 1;
    document.getElementById('genDate').textContent =
        pad2(thisMonth) + '月' + pad2(today.getDate()) + '日';

    var next = getNextFriday();
    var nextDuty = null;
    for (var i = 0; i < DATA.length; i++) {
        if (DATA[i].date === next.iso) { nextDuty = DATA[i]; break; }
    }
    if (!nextDuty) nextDuty = DATA[0];

    var isThisWeek = isInThisWeek(next.iso);
    document.getElementById('cardHeader').textContent = isThisWeek ? '本周例会' : '下次例会';
    document.getElementById('cardHeader').style.background = isThisWeek ? '#1a7a3a' : '#c41230';
    document.getElementById('thisWeekHost').textContent = nextDuty.host;
    document.getElementById('thisWeekRadar').textContent = nextDuty.radar;
    document.getElementById('thisWeekDate').textContent = next.label;

    // Build table grouped by month (multiple tbody siblings, no nesting)
    var table = document.getElementById('scheduleTable');
    var currentMonth = 0;
    var html = '';
    var monthGroupOpen = false;

    for (var i = 0; i < DATA.length; i++) {
        var d = DATA[i];
        if (d.month !== currentMonth) {
            if (monthGroupOpen) { html += '</tbody>'; monthGroupOpen = false; }
            currentMonth = d.month;
            var isPast = d.month < thisMonth ? ' past' : '';
            html += '<tbody class="month-group' + isPast + '" id="month-' + d.month + '">';
            html += '<tr class="month-sep" onclick="toggleMonth(' + d.month + ')">'
                + '<td colspan="3"><span class="arrow">&#9660;</span>' + d.month + '月</td></tr>';
            monthGroupOpen = true;
        }
        var cls = (d.date === next.iso) ? 'this-week month-row' : 'month-row';
        html += '<tr class="' + cls + '" id="row-' + d.date + '">'
            + '<td>' + d.month + '/' + pad2(d.day) + '</td>'
            + '<td>' + d.host + '</td>'
            + '<td>' + d.radar + '</td></tr>';
    }
    if (monthGroupOpen) html += '</tbody>';

    // Remove old tbody elements, keep thead
    var oldBodies = table.querySelectorAll('tbody');
    for (var j = 0; j < oldBodies.length; j++) oldBodies[j].remove();
    table.insertAdjacentHTML('beforeend', html);

    setTimeout(function() {
        var row = document.getElementById('row-' + next.iso);
        if (row) {
            row.scrollIntoView({ behavior: 'smooth', block: 'center' });
            // Auto-expand the month if it was collapsed
            var group = row.closest('.month-group');
            if (group && group.classList.contains('past')) {
                group.classList.remove('past');
            }
        }
    }, 400);
}

function scrollToToday() {
    var next = getNextFriday();
    var row = document.getElementById('row-' + next.iso);
    if (row) {
        var group = row.closest('.month-group');
        if (group && group.classList.contains('past')) {
            group.classList.remove('past');
        }
        row.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

render();
</script>

</body>
</html>
